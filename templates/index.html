<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebuss | Product Recommendations using Sentiment Analysis</title>
    <style>
        /* Modern Reset and Google Font */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f4f7f9; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Main Container Card */
        .container { 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        h2 { 
            color: #2c3e50; 
            margin-bottom: 8px;
            font-size: 24px;
        }

        p.subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Form Alignment */
        form {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            text-align: left;
        }

        label {
            font-weight: 600;
            color: #34495e;
            margin-bottom: 8px;
            font-size: 14px;
        }

        /* Dropdown Styling */
        select { 
            padding: 12px 15px; 
            font-size: 16px; 
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            background-color: #fff;
            color: #2d3436;
            outline: none;
            transition: border-color 0.3s ease;
            appearance: none; /* Removes default arrow */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 15px;
        }

        select:focus {
            border-color: #28a745;
        }

        /* Active Green Button */
        button { 
            padding: 14px; 
            margin-top: 25px; 
            font-size: 16px; 
            font-weight: 700;
            color: white;
            background-color: #28a745; 
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.2);
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #218838;
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(40, 167, 69, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        /* Results Section */
        .result-box { 
            margin-top: 35px; 
            padding-top: 25px;
            border-top: 1px solid #eee;
            text-align: left;
        }

        .result-box h3 {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        ul { list-style: none; padding: 0; margin: 0; }
        
        li { 
            background: #f8fdf9; 
            margin-bottom: 10px; 
            padding: 12px 15px; 
            border-left: 4px solid #28a745; 
            border-radius: 6px;
            font-size: 14px;
            color: #2d3436;
            display: flex;
            align-items: center;
        }

        li::before {
            content: "✓";
            margin-right: 10px;
            color: #28a745;
            font-weight: bold;
        }

        .error { 
            color: #e74c3c; 
            font-size: 14px; 
            margin-top: 15px;
            background: #fdf2f2;
            padding: 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Ebuss</h2>
    <p class="subtitle">Sentiment-Based Product Recommendations</p>
    
    <form action="/predict" method="post">
        <label for="username">Target User</label>
        <select name="username" id="username" required>
            <option value="" disabled selected>Select a user from database...</option>
            {% for user in user_list %}
                <option value="{{ user }}">{{ user }}</option>
            {% endfor %}
        </select>
        
        <button type="submit">Generate Recommendations</button>
    </form>

    {% if message %}
        <p class="error">{{ message }}</p>
    {% endif %}

    {% if recommendations %}
        <div class="result-box">
            <h3>Recommendations for <strong>{{ username }}</strong></h3>
            <ul>
                {% for item in recommendations %}
                    <li>{{ item }}</li>
                {% endfor %}
            </ul>
        </div>
    {% endif %}
</div>

</body>
</html>
